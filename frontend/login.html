<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> · Téléchirurgie | Authentification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Helvetica+Neue:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-500: #ff7900;
            --orange-600: #e56a00;
            --orange-700: #cc5a00;
            --black: #000000;
            --white: #ffffff;
            --gray-50: #f8f9fa;
            --gray-100: #f0f0f0;
            --gray-200: #e0e0e0;
            --gray-300: #cccccc;
            --gray-400: #999999;
            --gray-500: #666666;
            --gray-600: #333333;
            --gray-700: #1a1a1a;
            --radius-none: 0px;
            --transition-base: 0.2s ease;
            --font-sans: 'Helvetica Neue', 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: #f5f5f5;
            color: var(--black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }

        /* === Fond animé avec le bras robotique === */
        .bg-robot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.25;
        }

        .bg-robot svg {
            width: 100%;
            height: 100%;
        }

        /* Animation des articulations */
        .joint {
            transform-origin: center;
            animation: jointPulse 4s ease-in-out infinite;
        }
        .joint:nth-child(2) { animation-delay: 0.5s; }
        .joint:nth-child(3) { animation-delay: 1s; }
        .joint:nth-child(4) { animation-delay: 1.5s; }
        .joint:nth-child(5) { animation-delay: 2s; }
        .joint:nth-child(6) { animation-delay: 2.5s; }

        @keyframes jointPulse {
            0%, 100% { transform: rotate(0deg) scale(1); opacity: 0.7; }
            50% { transform: rotate(2deg) scale(1.2); opacity: 1; }
        }

        /* Lignes de connexion subtiles */
        .connection {
            stroke-dasharray: 4 4;
            animation: dashFlow 3s linear infinite;
        }
        @keyframes dashFlow {
            to { stroke-dashoffset: -20; }
        }

        /* Cercle de fond technique */
        .tech-circle {
            animation: rotateSlow 20s linear infinite;
            transform-origin: center;
        }
        @keyframes rotateSlow {
            to { transform: rotate(360deg); }
        }

        /* === Conteneur du formulaire === */
        .auth-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            padding: 2.5rem;
        }

        .auth-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-none);
            padding: 4rem 3.5rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        /* --- En-tête avec logo Orange --- */
        .brand {
            text-align: center;
            margin-bottom: 3rem;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            background-color: var(--orange-500);
            border-radius: var(--radius-none);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .brand-logo svg {
            width: 32px;
            height: 32px;
            fill: var(--white);
        }

        .brand h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--black);
            letter-spacing: -0.02em;
        }

        .brand .subtitle {
            font-size: 1rem;
            color: var(--gray-500);
            margin-top: 0.35rem;
            font-weight: 400;
        }

        /* --- Formulaire --- */
        .form-group {
            margin-bottom: 1.75rem;
        }

        .form-group label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            color: var(--black);
            margin-bottom: 0.6rem;
        }

        .form-group input {
            width: 100%;
            padding: 1.1rem 1.25rem;
            font-family: var(--font-sans);
            font-size: 1.05rem;
            color: var(--black);
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: var(--radius-none);
            outline: none;
            transition: border-color var(--transition-base), box-shadow var(--transition-base);
        }

        .form-group input:focus {
            border-color: var(--orange-500);
            box-shadow: 0 0 0 3px rgba(255, 121, 0, 0.15);
        }

        .form-group input::placeholder {
            color: var(--gray-400);
            font-weight: 400;
        }

        /* --- Sous-texte d'instruction --- */
        .instruction-text {
            font-size: 0.9rem;
            color: var(--gray-500);
            margin: -0.5rem 0 1.75rem;
            text-align: left;
        }

        /* --- Bouton principal --- */
        .btn-primary {
            width: 100%;
            padding: 1.2rem 1.5rem;
            font-family: var(--font-sans);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--white);
            background-color: var(--orange-500);
            border: none;
            border-radius: var(--radius-none);
            cursor: pointer;
            transition: background-color var(--transition-base), transform 0.1s ease;
            letter-spacing: 0.02em;
        }

        .btn-primary:hover {
            background-color: var(--orange-600);
        }

        .btn-primary:active {
            background-color: var(--orange-700);
            transform: scale(0.98);
        }

        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.8;
            position: relative;
            color: transparent;
        }

        .btn-primary.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px;
            height: 22px;
            margin: -11px 0 0 -11px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Pied de carte --- */
        .footer-note {
            text-align: center;
            margin-top: 2.25rem;
            font-size: 0.8rem;
            color: var(--gray-400);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .footer-note .dot {
            width: 3px;
            height: 3px;
            background: var(--gray-300);
            border-radius: 50%;
        }

        /* --- Message d'erreur --- */
        .error-banner {
            background: #fff0f0;
            border: 1px solid #ffc9c9;
            border-radius: var(--radius-none);
            padding: 1rem 1.25rem;
            margin-bottom: 1.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #b00020;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .auth-wrapper {
                max-width: 100%;
                padding: 1.5rem;
            }
            .auth-card {
                padding: 2.5rem 2rem;
            }
            .brand h1 {
                font-size: 1.5rem;
            }
            .form-group input {
                padding: 1rem 1.1rem;
                font-size: 1rem;
            }
            .btn-primary {
                padding: 1.1rem 1.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Animation de fond : bras robotique chirurgical 6 axes -->
    <div class="bg-robot">
        <svg viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Cercles techniques concentriques -->
            <circle cx="500" cy="400" r="300" stroke="#0b3d5f" stroke-width="1" opacity="0.1" class="tech-circle"/>
            <circle cx="500" cy="400" r="250" stroke="#0b3d5f" stroke-width="1" opacity="0.15" class="tech-circle" style="animation-direction: reverse; animation-duration: 25s;"/>
            <circle cx="500" cy="400" r="200" stroke="#ff7900" stroke-width="1" opacity="0.1" class="tech-circle" style="animation-duration: 18s;"/>

            <!-- Base du robot -->
            <rect x="440" y="600" width="120" height="40" rx="0" stroke="#0b3d5f" stroke-width="2" opacity="0.5"/>
            <line x1="500" y1="600" x2="500" y2="520" stroke="#0b3d5f" stroke-width="4" stroke-linecap="square" opacity="0.5"/>

            <!-- Bras articulé (6 segments = 6 degrés de liberté) -->
            <!-- Segment 1 (épaule) -->
            <g class="joint">
                <line x1="500" y1="520" x2="550" y2="440" stroke="#ff7900" stroke-width="4" stroke-linecap="square"/>
                <circle cx="500" cy="520" r="6" fill="#ff7900" opacity="0.6"/>
            </g>
            <!-- Segment 2 (coude) -->
            <g class="joint">
                <line x1="550" y1="440" x2="510" y2="360" stroke="#ff7900" stroke-width="4" stroke-linecap="square"/>
                <circle cx="550" cy="440" r="6" fill="#ff7900" opacity="0.6"/>
            </g>
            <!-- Segment 3 (poignet 1) -->
            <g class="joint">
                <line x1="510" y1="360" x2="570" y2="290" stroke="#ff7900" stroke-width="4" stroke-linecap="square"/>
                <circle cx="510" cy="360" r="6" fill="#ff7900" opacity="0.6"/>
            </g>
            <!-- Segment 4 (poignet 2) -->
            <g class="joint">
                <line x1="570" y1="290" x2="540" y2="230" stroke="#ff7900" stroke-width="4" stroke-linecap="square"/>
                <circle cx="570" cy="290" r="6" fill="#ff7900" opacity="0.6"/>
            </g>
            <!-- Segment 5 (effecteur 1) -->
            <g class="joint">
                <line x1="540" y1="230" x2="580" y2="180" stroke="#ff7900" stroke-width="4" stroke-linecap="square"/>
                <circle cx="540" cy="230" r="6" fill="#ff7900" opacity="0.6"/>
            </g>
            <!-- Segment 6 (effecteur terminal / pince) -->
            <g class="joint">
                <path d="M580 180 L590 160 L610 160 L620 180" stroke="#0b3d5f" stroke-width="3" stroke-linejoin="round"/>
                <circle cx="580" cy="180" r="6" fill="#ff7900" opacity="0.6"/>
                <circle cx="600" cy="170" r="4" fill="#0b3d5f" opacity="0.5"/>
            </g>

            <!-- Lignes de connexion / flux -->
            <line x1="300" y1="700" x2="700" y2="100" stroke="#0b3d5f" stroke-width="1" stroke-dasharray="8 8" opacity="0.1" class="connection"/>
            <line x1="700" y1="700" x2="300" y2="100" stroke="#0b3d5f" stroke-width="1" stroke-dasharray="8 8" opacity="0.1" class="connection" style="animation-duration: 4s;"/>
            <line x1="100" y1="400" x2="900" y2="400" stroke="#0b3d5f" stroke-width="1" stroke-dasharray="6 6" opacity="0.08" class="connection" style="animation-duration: 5s;"/>
            <line x1="500" y1="50" x2="500" y2="750" stroke="#0b3d5f" stroke-width="1" stroke-dasharray="6 6" opacity="0.08" class="connection" style="animation-duration: 3.5s;"/>

            <!-- Points de données (style médical) -->
            <circle cx="200" cy="300" r="3" fill="#0b3d5f" opacity="0.4"/>
            <circle cx="800" cy="500" r="3" fill="#0b3d5f" opacity="0.4"/>
            <circle cx="750" cy="200" r="2" fill="#0b3d5f" opacity="0.3"/>
            <circle cx="250" cy="600" r="2" fill="#0b3d5f" opacity="0.3"/>
            <circle cx="850" cy="650" r="2" fill="#0b3d5f" opacity="0.3"/>
            <circle cx="150" cy="150" r="2" fill="#0b3d5f" opacity="0.3"/>
        </svg>
    </div>

    <!-- Formulaire (identique au précédent) -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand">
                <div class="brand-logo" aria-label="Logo MediBot">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 3h4v7h7v4h-7v7h-4v-7H3v-4h7V3z" fill="white"/>
                    </svg>
                </div>
                <h1>Espace d'opération</h1>
                <p class="subtitle">Système de Téléchirurgie</p>
            </div>

            <div id="errorContainer"></div>

            <form id="loginForm" novalidate autocomplete="off">
                <div class="form-group">
                    <label for="identifier">Identifiant</label>
                    <input type="text" id="identifier" name="identifier" placeholder="Chirurgien ou Assistant" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <p class="instruction-text">Entrez votre adresse email et votre mot de passe ci-dessus.</p>
                <button type="submit" class="btn-primary" id="loginBtn">Se connecter</button>
            </form>

            <div class="footer-note">
                <span>🔒 Connexion sécurisée</span>
                <span class="dot"></span>
                <span>Protocole TLS 1.3</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            function getBackendHost() {
                const stored = localStorage.getItem('medibot_backend_host');
                if (stored) return stored;
                return window.location.hostname === 'localhost' ? 'localhost:3000' : '10.117.147.182:3000';
            }
            const BACKEND_HOST = getBackendHost();
            const API_URL = `http://${BACKEND_HOST}/api`;

            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const errorContainer = document.getElementById('errorContainer');
            const originalBtnText = loginBtn.textContent;

            function showError(message) {
                errorContainer.innerHTML = `<div class="error-banner"><span>⚠️</span><span>${escapeHTML(message)}</span></div>`;
            }
            function clearErrors() { errorContainer.innerHTML = ''; }
            function escapeHTML(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

            function setLoading(isLoading) {
                if (isLoading) {
                    loginBtn.classList.add('loading');
                    loginBtn.textContent = '';
                    loginBtn.disabled = true;
                } else {
                    loginBtn.classList.remove('loading');
                    loginBtn.textContent = originalBtnText;
                    loginBtn.disabled = false;
                }
            }

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                clearErrors();
                const identifier = document.getElementById('identifier').value.trim();
                const password = document.getElementById('password').value;
                if (!identifier) { showError('Veuillez saisir votre identifiant.'); document.getElementById('identifier').focus(); return; }
                if (!password) { showError('Veuillez saisir votre mot de passe.'); document.getElementById('password').focus(); return; }
                setLoading(true);
                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: identifier, password: password }),
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || 'Identifiants invalides.');
                    localStorage.setItem('medibot_backend_host', BACKEND_HOST);
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    sessionStorage.setItem('userRole', data.user.role);
                    sessionStorage.setItem('userName', data.user.email);
                    const redirectURL = data.user.role === 'assistant' ? 'assistant.html' : 'dashboard.html';
                    window.location.href = redirectURL;
                } catch (error) {
                    if (error instanceof TypeError) {
                        showError(`Backend inaccessible à ${API_URL}. Vérifie l'adresse réseau.`);
                    } else {
                        showError(error.message || 'Une erreur est survenue.');
                    }
                    setLoading(false);
                }
            });

            window.addEventListener('pageshow', () => { setLoading(false); clearErrors(); });
            console.log('[MediBot Auth] Module prêt — Backend :', API_URL);
        })();
    </script>
</body>
</html>
